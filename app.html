      //处理渠道号下限制广告请求
      function handleRequestAdByChannel(key, val, req) {
        const searchParams = new URLSearchParams(window.location.search);
        const channel = searchParams.has("channel") ? searchParams.get("channel") : "";
        if (!window.getCookie("requestAdByChannel")) {
          if (req) {
            return false;
          }
          let buffer = {};
          buffer[channel] = {};
          buffer[channel][key] = val;
          setCookieTomorrow("requestAdByChannel", JSON.stringify(buffer));
        } else {
          try {
            let buffer = JSON.parse(window.getCookie("requestAdByChannel"));
            if (!buffer[channel]) {
              if (req) {
                return false;
              }
              buffer[channel] = {};
              buffer[channel][key] = val;
              setCookieTomorrow("requestAdByChannel", JSON.stringify(buffer));
            } else {
              if (req) {
                if (
                  !buffer[channel].first &&
                  buffer[channel]?.mounted &&
                  buffer[channel]?.query_ad &&
                  buffer[channel]?.click_ad
                ) {
                  buffer[channel].first = val;
                  setCookieTomorrow("requestAdByChannel", JSON.stringify(buffer));
                  return true;
                } else if (buffer[channel].first !== "ok" && !key) {
                  if (Number(buffer[channel].first) > 1) {
                    buffer[channel].first = Number(buffer[channel].first) - 1;
                    setCookieTomorrow("requestAdByChannel", JSON.stringify(buffer));
                  } else {
                    buffer[channel].first = "ok";
                    setCookieTomorrow("requestAdByChannel", JSON.stringify(buffer));
                  }
                  return true;
                } else {
                  return false;
                }
              } else {
                buffer[channel][key] = val;
                setCookieTomorrow("requestAdByChannel", JSON.stringify(buffer));
              }
            }
          } catch (e) {}
        }
      }

      /* Cookie 操作 */
      function getMainDomain() {
        const url = window.location.hostname; // 获取当前主机名
        const parts = url.split("."); // 按点分割
        if (parts.length > 2) {
          // 当主机名有子域时，取最后两个部分
          return parts.slice(-2).join("."); // 返回主域名
        }
        return url; // 没有子域时直接返回当前主机名
      }

      function setCookie(name, value, daysToExpire = 1) {
        const date = new Date();
        date.setTime(date.getTime() + daysToExpire * 24 * 60 * 60 * 1000); // 设置过期时间为指定的天数之后
        const expires = "; expires=" + date.toUTCString(); // 转换为GMT格式的字符串
        document.cookie =
          name + "=" + (value || "") + expires + "; path=/; domain=" + getMainDomain(); // 设置cookie
      }

      function setCookieTomorrow(name, value) {
        const date = new Date();
        date.setDate(date.getDate() + 1);
        date.setHours(0, 0, 0, 0);
        const expires = "; expires=" + date.toUTCString();
        document.cookie =
          name + "=" + (value || "") + expires + "; path=/; domain=" + getMainDomain(); // 设置cookie
      }

      function getCookie(name) {
        const nameEQ = name + "=";
        const ca = document.cookie.split(";");
        for (let i = 0; i < ca.length; i++) {
          let c = ca[i];
          while (c.charAt(0) === " ") c = c.substring(1, c.length);
          if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
      }

            }
          }
        }
      };

      //处理向head标签中添加Schema
      function handleCreatScriptSchema(data) {
        const script = document.createElement("script");
        script.type = "application/ld+json";
        script.innerText = data;
        document.head.appendChild(script);
      }
      //处理向head标签中添加og 和twitter 配置
      function handleCreatMetaTag(obj = {}) {
        let keys = Object.keys(obj);
        if (keys?.length) {
          keys.forEach((item) => {
            let tagOg = document.createElement("meta");
            let tagTw = document.createElement("meta");
            tagOg.name = "og:" + item;
            tagTw.name = "twitter:" + item;
            tagOg.content = obj?.[item];
            tagTw.content = obj?.[item];
            document.head.appendChild(tagOg);
            document.head.appendChild(tagTw);
          });
        }
      }
      //处理规范化

        const link = document.createElement("link");
        link.rel = "canonical"
        link.href = href
        document.head.appendChild(link);
      })()

    <script>
      //获取用户属性
      function getUserProperty() {
        const hi_user_source = getValueByURLOrCookie("hi_source");
        const hi_user_sub_site = getHostname();
        const hi_user_timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown";
        const {
          hi_source_clid: hi_user_source_clid,
          hi_source_aid: hi_user_source_aid,
          hi_source_site: hi_user_source_site,
          hi_source_site_name: hi_user_source_site_name,
          hi_section_id: hi_user_section,
          hi_section_name: hi_user_section_name
        } = getInfoBySource(hi_user_source);
        return {
          hi_user_source,
          hi_user_sub_site,
          hi_user_timezone,
          hi_user_source_clid,
          hi_user_source_aid,
          hi_user_source_site,
          hi_user_source_site_name,
          hi_user_section,
          hi_user_section_name
        };
      }
      window.dataLayer = window.dataLayer || [];
      function legacyUUID() {
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
          const r = (Math.random() * 16) | 0;
          const v = c === "x" ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });
      }
      let uuid = window.getCookie("hi_user_id");
      if (!uuid) {
        uuid = legacyUUID().replace(/-/g, "");
        window.setCookie("hi_user_id", uuid);
      }
      const userProperties = {
        ...getUserProperty(),
        hi_user_id: uuid,
        hi_channel_user: getValueByURLOrCookie("channel")
      };
      gtag("set", "user_properties", {
        ...userProperties
      });
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-Z2NV94794K");

      //拦截fetch
      (function () {
        const { fetch: originalFetch } = window;
        window.fetch = async (...args) => {
          let [resource, config] = args;
          // console.log(args,'args');
          if (resource.includes("https://www.google-analytics.com/g/collect")) {
            for (let key in userProperties) {
              if (!resource.includes(`up.${key}=${userProperties[key]}`)) {
                resource = resource + `&up.${key}=${userProperties[key]}`;
              }
            }
          }
          // 发送请求
          return await originalFetch(resource, config);
        };
      })();
    </script>
    <script>
      //Detail_pv_user
      (function () {
        const { pathname } = window.location;
        const hi_source = getValueByURLOrCookie("hi_source");
        const { hi_source_clid } = getInfoBySource(hi_source);
        if (pathname.includes("/detail")) {
          window.setCookieTomorrow("detail_time", new Date().getTime());
          const detailPvUser = window.getCookie("detailPvUser");
          if (detailPvUser) {
            let buffer = {};
            try {
              buffer = JSON.parse(detailPvUser);
              if (!buffer[hi_source_clid]) {
                buffer[hi_source_clid] = {
                  isPush: true,
                  time: new Date().getTime()
                };
                //两次clid无点击逻辑按子渠道存
                if (!buffer[getHostname() + "_isPushGtm"]) {
                  if (buffer[getHostname() + "_first"]) {
                    if (
                      !buffer[getHostname() + "_second"] &&
                      buffer[getHostname() + "_first"] !== hi_source_clid
                    ) {
                      buffer[getHostname() + "_second"] = hi_source_clid;
                    }
                  } else {
                    buffer[getHostname() + "_first"] = hi_source_clid;
                  }
                }
                pushEventToGTM("Detail_pv_user");
                setCookieTomorrow("detailPvUser", JSON.stringify(buffer));
              }
            } catch (e) {}
          } else {
            let buffer = {};
            buffer[hi_source_clid] = {
              isPush: true,
              time: new Date().getTime()
            };
            buffer[getHostname() + "_first"] = hi_source_clid;
            pushEventToGTM("Detail_pv_user");
            setCookieTomorrow("detailPvUser", JSON.stringify(buffer));
          }
        }
      })();

    <script>
      /* eslint-disable no-undef */
      window.done = false;
      window.done1 = false;

      //上报根据语言获取国家埋点
      (function () {
        let country = window.getCountyByLanguage();
        window.dataLayer.push({
          event: "country_by_lang",
          country_and_lang:
            country + "_" + (window.navigator.language || window.navigator.userLanguage)
        });
      })();

      // 监听失去焦点事件
      window.addEventListener("blur", () => {
        const activeElement = document.activeElement;
        const activeSrc = activeElement.getAttribute("src");

        // afs埋点
        if (activeSrc && activeSrc.includes("afs/ads?")) {
          if (activeElement.getAttribute("title")) {
            dataLayer.push({ event: "D_AR" });
          } else {
            dataLayer.push({ event: "D_AC" });
          }
        }
      });

      window.addEventListener("beforeunload", () => {
        if (!window.done) {
          // 处理 AFS 广告埋点逻辑
          const activeElement = document.activeElement;
          const src = activeElement?.getAttribute("src") || "";
          let eventName = "";

          if (src.includes("afs/ads?")) {
            if (activeElement.getAttribute("title")) {
              // eventName = "T_AR";
              window.trackEventToPixel("T_AR");
              const searchParams = new URLSearchParams(window.location.search);
              const ttclid = searchParams.get("ttclid");
              pushEventToGTM("T_AR", {
                hi_country: window.youknowwho_ip_country || "unknown",
                hi_ip: window.youknowwho_ip || "unknown",
                hi_ttclid: ttclid || window.getCookie("hi_ttclid") || "unknown"
              });
              handleDataMonitor();
            } else {
              eventName = "T_AC";
              TACChangeCookie();
              if (window.location.pathname.startsWith("/detail")) {
                window.handleRequestAdByChannel("click_ad", 1);
                let bufferObj = window.getCookie("pathInfo");
                if (bufferObj) {
                  let obj = JSON.parse(bufferObj);
                  obj[window.location.pathname] = 0;
                  window.setCookie("pathInfo", JSON.stringify(obj));
                }
              }
            }
          } else if (src.includes("afs/ads/i/")) {
            eventName = "T_AG";
          }

          if (eventName) {
            window.pushEventParamsToGtm(eventName);
            window.done = true;
          }
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          setTimeout(() => {
            window.done = false;
            window.done1 = false;
            document.body.focus();
          }, 0);
        }
      });

      function HandleMessageTACANDTAR(e) {
        if (window.done1) {
          return;
        }
        const activeElement = document.activeElement;
        const src = activeElement?.getAttribute("src") || "";
        if (src.includes("afs/ads?")) {
          if (!activeElement.getAttribute("title")) {
            window.trackEventToPixel("T_AC_MSG");
            dataLayer.push({ event: "T_AC_MSG", hi_time: handleTACMSGToLoad() });
            window.done1 = true;
          }
        }
      }
      //TAC和TAR埋点监听消息
      window.addEventListener("message", (e) => {
        if (typeof e?.data === "string" && e?.data?.startsWith("FSXDC,.aCS:")) {
          HandleMessageTACANDTAR();
        }
      });
    </script>
